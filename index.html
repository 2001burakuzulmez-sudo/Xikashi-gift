<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Ankara — A Map of Us</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --light-red:   #e22227;
    --red:         #c7080c;
    --dark-red:    #6c0103;
    --red-darkest: #440101;
    --grey-light:  #55666e;
    --grey:        #222b31;
    --warm-bg:     #130b05;
    --amber:       #c8813a;
    --gold:        #e8b96a;
    --rose:        #c4705a;
    --rose-light:  #e8a898;
    --parchment:   #f0dfc8;
  
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--grey); font-family:'Crimson Pro',serif; overflow:hidden; height:100vh; width:100vw; }

  /* grain */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:500; opacity:0.35;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  }
  /* vignette */
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:499;
    background:radial-gradient(ellipse at center, transparent 60%, rgba(8,3,1,0.4) 100%);
  }

  /* ── INTRO ── */
  #intro {
    position:fixed; inset:0; background:var(--grey); z-index:600;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity 1.3s ease, transform 1.3s ease;
  }
  #intro.hidden { opacity:0; pointer-events:none; transform:scale(1.05); }
  .intro-ornament { color:var(--light-red); font-size:1.1rem; letter-spacing:0.7em; opacity:0; animation:fadeUp 1s ease 0.3s forwards; }
  .intro-title {
    font-family:'Cormorant Garamond',serif; font-size:clamp(3rem,6.5vw,5.2rem);
    color:#f0f0f0; font-weight:300; font-style:italic;
    text-align:center; line-height:1.08; margin:0.45em 0;
    opacity:0; animation:fadeUp 1s ease 0.7s forwards;
  }
  .intro-sub { color:var(--red); font-size:1.05rem; font-weight:300; letter-spacing:0.18em; opacity:0; animation:fadeUp 1s ease 1.1s forwards; }
  .intro-btn {
    margin-top:3em; padding:0.75em 3em; border:1px solid var(--red);
    background:transparent; color:var(--grey-light); font-family:'Crimson Pro',serif;
    font-size:1rem; letter-spacing:0.28em; cursor:pointer;
    position:relative; overflow:hidden; opacity:0; animation:fadeUp 1s ease 1.5s forwards; transition:color 0.4s;
  }
  .intro-btn::before { content:''; position:absolute; inset:0; background:var(--red); transform:translateX(-100%); transition:transform 0.4s ease; z-index:-1; }
  .intro-btn:hover { color:#f0f0f0; }
  .intro-btn:hover::before { transform:translateX(0); }

  /* ── MAP ── */
  #map { width:100vw; height:100vh; opacity:0; transition:opacity 1.2s ease; position:relative; z-index:1; cursor:pointer; }
  #map.visible { opacity:1; }
  /* CSS filter darkens the tile canvas. High saturate(2) ensures pre-inverted
     pin colors survive inversion and render as vivid reds post-filter. */
  #map canvas {
    filter: invert(1) hue-rotate(160deg) saturate(2) brightness(0.8);
  }
  .maplibregl-ctrl-attrib a { color:#55666e!important; }
  .maplibregl-ctrl-group { background:rgba(34,43,49,0.92)!important; border:1px solid var(--grey-light)!important; box-shadow:none!important; }
  .maplibregl-ctrl-group button { background-color:transparent!important; }
  .maplibregl-ctrl-icon { filter:invert(0.8) saturate(0); }

  /* ── HEADER ── */
  #header {
    position:fixed; top:0; left:0; right:0; padding:1.3em 2em;
    display:flex; align-items:baseline; gap:1em; z-index:400;
    opacity:0; pointer-events:none; transition:opacity 1s ease 0.4s;
    background:linear-gradient(to bottom, rgba(34,43,49,0.9), transparent);
  }
  #header.visible { opacity:1; }
  #header-title { font-family:'Cormorant Garamond',serif; font-size:1.55rem; color:#f0f0f0; font-style:italic; font-weight:300; }
  #header-sub { font-size:0.76rem; color:var(--light-red); letter-spacing:0.22em; }

  /* ── HINT ── */
  #hint {
    position:fixed; bottom:2.2em; left:50%; transform:translateX(-50%);
    color:var(--red); font-size:0.8rem; letter-spacing:0.22em;
    z-index:400; opacity:0; transition:opacity 1.2s ease; pointer-events:none; white-space:nowrap;
  }
  #hint.visible { opacity:0.5; }

  /* ── HOVER LABEL (floats near cursor over a pin) ── */
  #pin-label {
    position:fixed; z-index:450; pointer-events:none;
    background:rgba(34,43,49,0.94); border:1px solid var(--red);
    color:#f0f0f0; font-family:'Cormorant Garamond',serif;
    font-style:italic; font-size:12px; white-space:nowrap;
    padding:3px 11px 4px; box-shadow:0 4px 16px rgba(0,0,0,0.5);
    transform:translate(-50%,-100%) translateY(-10px);
    opacity:0; transition:opacity 0.2s;
  }
  #pin-label.visible { opacity:1; }

  /* ── MODAL ── */
  #modal-overlay {
    position:fixed; inset:0; background:rgba(34,43,49,0); z-index:700;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; transition:background 0.5s ease;
  }
  #modal-overlay.open { background:rgba(34,43,49,0.88); pointer-events:all; backdrop-filter:blur(5px); }
  #modal {
    background:linear-gradient(150deg,var(--grey),#1a2025); border:1px solid var(--dark-red);
    max-width:820px; width:94vw; max-height:92vh; position:relative;
    transform:translateY(28px) scale(0.96); opacity:0;
    transition:all 0.45s cubic-bezier(0.22,1,0.36,1); overflow-y:auto;
    box-shadow:0 32px 90px rgba(0,0,0,0.8), inset 0 1px 0 rgba(226,34,39,0.15);
  }
  #modal-overlay.open #modal { transform:translateY(0) scale(1); opacity:1; }
  #modal::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--dark-red),var(--light-red),var(--dark-red),transparent);
  }
  #modal-media { width:100%; height:460px; overflow:hidden; position:relative; background:var(--grey); }
  #modal-img { width:100%; height:100%; object-fit:cover; display:none; transition:transform 7s ease; transform:scale(1.05); }
  #modal-overlay.open #modal-img { transform:scale(1); }
  #modal-video { width:100%; height:100%; object-fit:cover; display:none; outline:none; }
  #modal-iframe { width:100%; height:100%; border:none; display:none; }
  #modal-ph { width:100%; height:100%; display:none; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--grey),#1a2025); font-size:4.5rem; }
  #modal-body { padding:1.6em 2.2em 2.2em; }
  #modal-date { font-size:0.76rem; letter-spacing:0.28em; color:var(--light-red); text-transform:uppercase; margin-bottom:0.3em; }
  #modal-title { font-family:'Cormorant Garamond',serif; font-size:2rem; color:#f0f0f0; font-weight:300; font-style:italic; line-height:1.12; margin-bottom:0.55em; }
  .ornament { text-align:center; color:var(--red); font-size:0.85rem; letter-spacing:0.45em; margin:0.6em 0; opacity:0.45; }
  #modal-desc { color:#c8c8c8; font-size:1.05rem; font-weight:300; line-height:1.7; }
  #modal-close { position:absolute; top:13px; right:16px; background:none; border:none; color:var(--grey-light); font-size:1.7rem; cursor:pointer; opacity:0.5; transition:opacity 0.2s; z-index:10; line-height:1; }
  #modal-close:hover { opacity:1; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

let libReady = false, enterRequested = false, mapInitialised = false;

(function loadMapLibre() {
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js';
  s.onload  = () => { libReady = true; if (enterRequested) doEnter(); };
  s.onerror = () => alert('Could not load map library. Check internet connection and refresh.');
  document.head.appendChild(s);
})();

function enterMap() {
  document.getElementById('intro').classList.add('hidden');
  if (libReady) setTimeout(doEnter, 1300); else enterRequested = true;
}
function doEnter() {
  document.getElementById('intro').style.display = 'none';
  if (!mapInitialised) { initMap(); mapInitialised = true; }
  document.getElementById('header').classList.add('visible');
  document.getElementById('hint').classList.add('visible');
  setTimeout(() => document.getElementById('hint').style.opacity = '0', 5500);
}

// Pins are GeoJSON symbol layers (GPU-rendered, no drift).
// Colors are pre-inverted to compensate for the CSS filter on the canvas.
// Computed via brute-force: these inputs produce palette reds post-filter.
// Filter: invert(1) hue-rotate(160deg) saturate(2) brightness(0.8)
function makePinImage() {
  const size = 56;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const cx = size/2, r = size*0.38, tip = size;
  ctx.beginPath();
  ctx.arc(cx, r, r, Math.PI, 0);
  ctx.quadraticCurveTo(cx+r, r*1.9, cx, tip*0.95);
  ctx.quadraticCurveTo(cx-r, r*1.9, cx-r, r);
  ctx.closePath();
  // Pre-inverted colors (computed):
  //   #f08d69 → renders as #e22227 (light-red) post-filter
  //   #ffe10f → renders as #c7090c (red) post-filter
  const g = ctx.createRadialGradient(cx-r*0.2, r*0.55, 0, cx, r, r);
  g.addColorStop(0, '#f08d69');
  g.addColorStop(1, '#ffe10f');
  ctx.fillStyle = g; ctx.fill();
  // Border: #fffc63 → renders as #6c0103 (dark-red) post-filter
  ctx.strokeStyle = '#fffc63'; ctx.lineWidth = size*0.04; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, r*0.75, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fill();
  return c;
}

function initMap() {
  const map = new maplibregl.Map({
    container:'map',
    style:'https://tiles.openfreemap.org/styles/positron',
    center:[32.8541, 39.9208],
    zoom:13
  });
  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

  map.on('error', e => {
    console.warn('MapLibre error:', e.error && e.error.message || e);
  });

  map.on('load', () => {
    try {
      const pinCanvas = makePinImage();
      const pinCtx = pinCanvas.getContext('2d');
      const pinData = pinCtx.getImageData(0, 0, pinCanvas.width, pinCanvas.height);
      map.addImage('memory-pin', {
        width: pinCanvas.width,
        height: pinCanvas.height,
        data: pinData.data
      }, { pixelRatio: 2 });

      map.addSource('memories', {
        type:'geojson',
        data:{
          type:'FeatureCollection',
          features: memories.map((m,i) => ({
            type:'Feature',
            geometry:{ type:'Point', coordinates:[m.lng, m.lat] },
            properties:{ id:i, title:m.title }
          }))
        }
      });

      map.addLayer({
        id:'memory-pins',
        type:'symbol',
        source:'memories',
        layout:{
          'icon-image':'memory-pin',
          'icon-size':0.55,
          'icon-anchor':'bottom',
          'icon-allow-overlap':true,
          'icon-ignore-placement':true
        }
      });

      // Glow pulse
      let t = 0;
      setInterval(() => {
        t += 0.05;
        const glow = 0.85 + 0.15 * Math.sin(t);
        if (map.getLayer('memory-pins')) {
          map.setPaintProperty('memory-pins', 'icon-opacity', glow);
        }
      }, 40);

      // Hover label
      const label = document.getElementById('pin-label');
      map.on('mouseenter', 'memory-pins', e => {
        map.getCanvas().style.cursor = 'pointer';
        const pt = e.point;
        label.textContent = e.features[0].properties.title;
        label.style.left  = pt.x + 'px';
        label.style.top   = pt.y + 'px';
        label.classList.add('visible');
      });
      map.on('mouseleave', 'memory-pins', () => {
        map.getCanvas().style.cursor = '';
        label.classList.remove('visible');
      });
      map.on('mousemove', 'memory-pins', e => {
        const pt = e.point;
        label.style.left = pt.x + 'px';
        label.style.top  = pt.y + 'px';
      });

      // Click → modal
      map.on('click', 'memory-pins', e => {
        const id = e.features[0].properties.id;
        openModal(id);
      });
    } catch(err) {
      console.error('Map init error:', err);
    }

    document.getElementById('map').classList.add('visible');
  });
}

// === IMGUR URL HELPER ===
function fixImgurUrl(url, ext) {
  if (!url) return url;
  const directRe = /^https?:\/\/i\.imgur\.com\/([A-Za-z0-9]+)(\.\w+)?/;
  const dm = url.match(directRe);
  if (dm) return 'https://i.imgur.com/' + dm[1] + '.' + ext;
  const pageRe = /^https?:\/\/(?:www\.)?imgur\.com\/(?!a\/)([A-Za-z0-9]+)/;
  const pm = url.match(pageRe);
  if (pm) return 'https://i.imgur.com/' + pm[1] + '.' + ext;
  return url;
}

// === MODAL ===
function openModal(id) {
  const m = memories[id];
  document.getElementById('modal-date').textContent  = m.date;
  document.getElementById('modal-title').textContent = m.title;
  document.getElementById('modal-desc').textContent  = m.desc;

  const elImg = document.getElementById('modal-img');
  const elVid = document.getElementById('modal-video');
  const elIfr = document.getElementById('modal-iframe');
  const elPh  = document.getElementById('modal-ph');

  elImg.style.display = elVid.style.display = elIfr.style.display = elPh.style.display = 'none';
  elVid.pause(); elVid.src = ''; elIfr.src = '';

  if (m.youtube) {
    elIfr.src = `https://www.youtube.com/embed/${m.youtube}?autoplay=0&rel=0`;
    elIfr.style.display = 'block';
  } else if (m.vimeo) {
    elIfr.src = `https://player.vimeo.com/video/${m.vimeo}`;
    elIfr.style.display = 'block';
  } else if (m.vid) {
    elVid.src = fixImgurUrl(m.vid, 'mp4');
    elVid.style.display = 'block';
    elVid.play().catch(() => {});
  } else if (m.img) {
    elImg.src = fixImgurUrl(m.img, 'jpg');
    elImg.style.display = 'block';
  } else {
    elPh.textContent = m.emoji;
    elPh.style.display = 'flex';
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  const elVid = document.getElementById('modal-video');
  const elIfr = document.getElementById('modal-iframe');
  elVid.pause(); elVid.src = ''; elIfr.src = '';
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
